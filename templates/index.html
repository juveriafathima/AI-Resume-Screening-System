<!DOCTYPE html>
<html>

<head>
    <title>AI Resume Analyzer</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        h1 {
            color: #222;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 25px;
        }

        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            width: 100%;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🚀 AI Resume Screening System</h1>

        <p>Upload your resume and get AI-powered analysis</p>

        <form action="/analyze" method="POST" enctype="multipart/form-data">

            <input type="file" name="resume" required>

            <br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

    </div>

</body>
</html>
